bio: "Rachel E. Scherr conducts research in the teaching and learning of physics as well as physics disciplinary culture and practices. Her current research includes teaching modern physics using a community agreements pedagogy, designing introductory physics labs that focus on experimental skills, and supporting other faculty to gain skills and experience with evidence-based teaching strategies.\n"

